<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Authentication - Azkura Auth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #00E5FF 0%, #2979FF 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(0, 229, 255, 0.3);
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    p {
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .status {
      padding: 16px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .status.loading {
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.3);
      color: #00E5FF;
    }
    
    .status.success {
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.3);
      color: #00E676;
    }
    
    .status.error {
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid rgba(255, 82, 82, 0.3);
      color: #FF5252;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 229, 255, 0.2);
      border-top-color: #00E5FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .btn {
      background: linear-gradient(135deg, #00E5FF 0%, #2979FF 100%);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 229, 255, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error-details {
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid rgba(255, 82, 82, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      font-family: monospace;
      font-size: 12px;
      color: #FF5252;
      word-break: break-all;
      text-align: left;
    }
    
    .redirect-uri {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin: 16px 0;
      font-family: monospace;
      font-size: 11px;
      word-break: break-all;
      color: rgba(255, 255, 255, 0.8);
    }
    
    a { color: #00E5FF; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔐</div>
    <h1>Azkura Auth</h1>
    <p id="message">Processing authentication...</p>
    
    <div id="status" class="status loading">
      <div class="spinner"></div>
      <div>Completing sign in...</div>
    </div>
    
    <div id="errorDetails" class="error-details" style="display: none;"></div>
    <div id="redirectUriBox" class="redirect-uri" style="display: none;"></div>
    
    <button id="closeBtn" class="btn" style="display: none;">Close</button>
  </div>
  
  <script>
    (function() {
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');
      const errorDetailsEl = document.getElementById('errorDetails');
      const redirectUriBox = document.getElementById('redirectUriBox');
      const closeBtn = document.getElementById('closeBtn');
      
      // Get URL hash and query parameters
      const url = new URL(window.location.href);
      const hash = url.hash.substring(1); // Remove leading #
      const hashParams = new URLSearchParams(hash);
      const queryParams = new URLSearchParams(url.search);
      
      const accessToken = hashParams.get('access_token');
      const error = hashParams.get('error') || queryParams.get('error');
      const errorDescription = hashParams.get('error_description') || queryParams.get('error_description');
      const state = hashParams.get('state') || queryParams.get('state');
      
      console.log('[Auth Callback] URL:', window.location.href);
      console.log('[Auth Callback] Access token:', accessToken ? 'present' : 'missing');
      console.log('[Auth Callback] Error:', error);
      console.log('[Auth Callback] State:', state);
      
      // Function to show success
      function showSuccess() {
        statusEl.className = 'status success';
        statusEl.innerHTML = '✓ Authentication successful!';
        messageEl.textContent = 'You can now close this tab and return to the app.';
        closeBtn.style.display = 'inline-block';
      }
      
      // Function to show error
      function showError(title, details) {
        statusEl.className = 'status error';
        statusEl.innerHTML = '✕ ' + title;
        messageEl.textContent = 'An error occurred during authentication.';
        
        if (details) {
          errorDetailsEl.textContent = details;
          errorDetailsEl.style.display = 'block';
        }
        
        // Show redirect URI for redirect_uri_mismatch error
        if (error === 'redirect_uri_mismatch') {
          const redirectUri = 'https://' + chrome.runtime.id + '.chromiumapp.org/';
          redirectUriBox.innerHTML = 
            '<strong>Redirect URI to register:</strong><br>' + redirectUri + '<br><br>' +
            '<strong>Steps to fix:</strong><br>' +
            '1. Go to <a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console</a><br>' +
            '2. Find your OAuth 2.0 Client ID<br>' +
            '3. Add the above URI to "Authorized redirect URIs"';
          redirectUriBox.style.display = 'block';
        }
        
        closeBtn.style.display = 'inline-block';
        closeBtn.textContent = 'Close';
      }
      
      // Handle different scenarios
      if (error) {
        // Error from OAuth
        let errorTitle = 'Authentication failed';
        if (error === 'redirect_uri_mismatch') {
          errorTitle = 'Redirect URI not registered';
        } else if (error === 'access_denied') {
          errorTitle = 'Access denied';
        }
        showError(errorTitle, errorDescription || error);
      } else if (accessToken) {
        // Success - token received
        // Store token temporarily so the main app can pick it up
        const authData = {
          token: accessToken,
          state: state,
          timestamp: Date.now()
        };
        
        chrome.storage.local.set({ 'pendingGoogleAuth': authData }, () => {
          console.log('[Auth Callback] Token stored temporarily');
          showSuccess();
          
          // Try to notify the opener window
          if (window.opener) {
            try {
              window.opener.postMessage({ type: 'AZKURA_AUTH_SUCCESS', token: accessToken }, '*');
            } catch (e) {
              console.log('[Auth Callback] Could not post message to opener');
            }
          }
        });
      } else {
        // No token and no error - might be the initial load
        messageEl.textContent = 'Waiting for authentication...';
        
        // If no hash after 5 seconds, show error
        setTimeout(() => {
          if (!window.location.hash && !window.location.search.includes('error')) {
            showError('No authentication data received', 'The authentication response did not contain a token.');
          }
        }, 5000);
      }
      
      // Close button handler
      closeBtn.addEventListener('click', () => {
        window.close();
      });
    })();
  </script>
</body>
</html>
